<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YONG TODO</title>
  <link rel="stylesheet" href="./week1_m1.css" />
  <script type="module" src="./week1_m1.js" defer></script>
</head>
<body>
  <div class="todo-app">
    <h1 class="todo-app__title">YONG TODO</h1>

    <form id="todo-form" class="todo-app__form">
      <input
        id="todo-input"
        class="todo-app__input"
        type="text"
        placeholder="할 일을 입력"
        required
      />
      <button type="submit" class="todo-app__add-button">할 일 추가</button>
    </form>

    <div class="todo-app__board">
      <section class="todo-app__section">
        <h2 class="todo-app__section-title">할 일</h2>
        <ul id="todo-list" class="todo-app__list"></ul>
      </section>

      <section class="todo-app__section">
        <h2 class="todo-app__section-title">완료</h2>
        <ul id="done-list" class="todo-app__list"></ul>
      </section>
    </div>
  </div>
</body>
</html>
