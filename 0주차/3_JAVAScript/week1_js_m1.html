<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UMC Study Plan</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #eef1f4 0%, #f4f6f8 55%, #e9edf1 100%);
    }

    .planner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px;
      border-top: 1px solid #666;
    }

    .planner__header {
      text-align: center;
      margin-bottom: 50px;
    }

    .planner__title {
      font-size: 48px;
      font-weight: 700;
    }

    .planner__form-wrap {
      max-width: 800px;
      margin: 0 auto 28px;
      border-top: 1px solid #ddd;
      padding-top: 20px;
    }

    .planner__input {
      display: block;
      width: 520px;
      height: 50px;
      margin: 0 auto;
      border: 2px solid #999;
      padding: 0 15px;
      font-size: 16px;
      background: #f9f9f9;
    }

    .planner__board {
      max-width: 520px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
    }

    .planner__section {
      text-align: center;
    }

    .planner__section-title {
      display: inline-block;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      padding-bottom: 6px;
      border-bottom: 2px solid #d7e1ec;
    }

    .planner__list {
      list-style: none;
      text-align: left;
    }

    .planner__item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      margin-bottom: 12px;
      border-bottom: 2px solid #d7e1ec;
    }

    .planner__item-text {
      font-size: 16px;
      font-weight: 700;
    }

    .planner__actions {
      display: flex;
      gap: 6px;
    }

    .planner__button {
      font-size: 10px;
      padding: 3px 6px;
      border: 1px solid #d7e1ec;
      background: #eef3f9;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main class="planner">
    <header class="planner__header">
      <h1 class="planner__title">UMC Study Plan</h1>
    </header>

    <div class="planner__form-wrap">
      <input id="todoInput" class="planner__input" type="text"
        placeholder="스터디 계획을 정리해보세요!" />
    </div>

    <div class="planner__board">
      <section class="planner__section">
        <h2 class="planner__section-title">해야 할 일</h2>
        <ul id="todoList" class="planner__list"></ul>
      </section>

      <section class="planner__section">
        <h2 class="planner__section-title">해낸 일</h2>
        <ul id="doneList" class="planner__list"></ul>
      </section>
    </div>
  </main>

  <script>
    const input = document.getElementById("todoInput");
    const todoList = document.getElementById("todoList");
    const doneList = document.getElementById("doneList");

    let todos = JSON.parse(localStorage.getItem("todos")) || [];

    function saveTodos() {
      localStorage.setItem("todos", JSON.stringify(todos));
    }

    function createButton(text) {
      const btn = document.createElement("button");
      btn.textContent = text;
      btn.className = "planner__button";
      return btn;
    }

    function render() {
      todoList.innerHTML = "";
      doneList.innerHTML = "";

      todos.forEach((todo, index) => {
        const li = document.createElement("li");
        li.className = "planner__item";

        const span = document.createElement("span");
        span.className = "planner__item-text";
        span.textContent = todo.text;

        const actions = document.createElement("div");
        actions.className = "planner__actions";

        if (!todo.done) {
          const completeBtn = createButton("완료");
          completeBtn.onclick = () => {
            todos[index].done = true;
            saveTodos();
            render();
          };
          actions.append(completeBtn);
          li.append(span, actions);
          todoList.append(li);
        } else {
          const deleteBtn = createButton("삭제");
          deleteBtn.onclick = () => {
            todos.splice(index, 1);
            saveTodos();
            render();
          };
          actions.append(deleteBtn);
          li.append(span, actions);
          doneList.append(li);
        }
      });
    }

    function addTodo() {
      const value = input.value.trim();
      if (!value) return;

      if (todos.some(t => t.text.toLowerCase() === value.toLowerCase())) return;

      todos.push({ text: value, done: false });
      saveTodos();
      render();

      input.value = "";
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTodo();
    });

    render();
  </script>
</body>
</html>
